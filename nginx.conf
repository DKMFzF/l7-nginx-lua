worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;

    lua_shared_dict balancer_cache 1m;
    resolver 127.0.0.11 ipv6=off;

    init_by_lua_block {
        ngx.shared.balancer_cache:set("rr_idx", 0)
    }

    server {
        listen 80;
        server_name _;

        location = /health {
            default_type text/plain;
            return 200 "ok\n";
        }

        location = /admin/route {
            content_by_lua_block {
                local target = ngx.var.arg_target
                if target ~= "master" and target ~= "replica" and target ~= "round_robin" then
                    ngx.status = 400
                    ngx.say('{"error":"use target=master|replica|round_robin"}')
                    return
                end

                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)

                local ok, err = red:connect("redis-master", 6379)
                if not ok then
                    ngx.status = 500
                    ngx.say('{"error":"redis-master connection failed","details":"' .. err .. '"}')
                    return
                end

                local ok_set, set_err = red:set("route:read_target", target)
                if not ok_set then
                    ngx.status = 500
                    ngx.say('{"error":"cannot persist route","details":"' .. set_err .. '"}')
                    return
                end

                red:set_keepalive(10000, 100)
                ngx.say('{"ok":true,"read_target":"' .. target .. '"}')
            }
        }

        location = /set {
            content_by_lua_block {
                local key = ngx.var.arg_key
                local value = ngx.var.arg_value

                if not key or not value then
                    ngx.status = 400
                    ngx.say('{"error":"use /set?key=...&value=..."}')
                    return
                end

                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)

                local ok, err = red:connect("redis-master", 6379)
                if not ok then
                    ngx.status = 500
                    ngx.say('{"error":"redis-master connection failed","details":"' .. err .. '"}')
                    return
                end

                local ok_set, set_err = red:set(key, value)
                if not ok_set then
                    ngx.status = 500
                    ngx.say('{"error":"set failed","details":"' .. set_err .. '"}')
                    return
                end

                red:set_keepalive(10000, 100)
                ngx.say('{"ok":true,"writer":"redis-master","key":"' .. key .. '","value":"' .. value .. '"}')
            }
        }

        location = /get {
            content_by_lua_block {
                local key = ngx.var.arg_key
                if not key then
                    ngx.status = 400
                    ngx.say('{"error":"use /get?key=..."}')
                    return
                end

                local redis = require "resty.redis"
                local route_redis = redis:new()
                route_redis:set_timeout(1000)

                local ok_route, err_route = route_redis:connect("redis-master", 6379)
                if not ok_route then
                    ngx.status = 500
                    ngx.say('{"error":"route redis connection failed","details":"' .. err_route .. '"}')
                    return
                end

                local read_target = route_redis:get("route:read_target")
                route_redis:set_keepalive(10000, 100)

                if read_target == ngx.null then
                    read_target = "round_robin"
                end

                local host = "redis-master"
                if read_target == "replica" then
                    host = "redis-replica"
                elseif read_target == "round_robin" then
                    local idx = ngx.shared.balancer_cache:incr("rr_idx", 1, 0)
                    if (idx % 2) == 0 then
                        host = "redis-master"
                    else
                        host = "redis-replica"
                    end
                end

                local red = redis:new()
                red:set_timeout(1000)
                local ok_data, err_data = red:connect(host, 6379)
                if not ok_data then
                    ngx.status = 500
                    ngx.say('{"error":"data redis connection failed","details":"' .. err_data .. '"}')
                    return
                end

                local value, get_err = red:get(key)
                if get_err then
                    ngx.status = 500
                    ngx.say('{"error":"get failed","details":"' .. get_err .. '"}')
                    return
                end

                red:set_keepalive(10000, 100)
                if value == ngx.null then
                    value = ""
                end

                ngx.say(
                    '{"ok":true,"reader":"' .. host .. '","route":"' .. read_target ..
                    '","key":"' .. key .. '","value":"' .. value .. '"}'
                )
            }
        }
    }
}
